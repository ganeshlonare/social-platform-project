spring:
  application:
    name: posts-service

  datasource:
    url: jdbc:postgresql://localhost:5432/postsServiceDB
    username: postgres
    password: postgres
    driver-class-name=org: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true

server:
  port: 8082
  servlet:
    context-path: /posts

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka